
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Upload PDFs | SAMTECH LIBRARY
  </title>

  <link
    rel="stylesheet"
    href="../css/analytics.css"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

</head>

<body>

  <div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="logo">

        <i class="fa-solid fa-shield-halved"></i>

        <div>

          <h2>SAMTECH</h2>

          <span>LIBRARY ADMIN</span>

        </div>

      </div>

      <ul class="menu">

        <li onclick="goDashboard()">

          <i class="fa-solid fa-chart-line"></i>

          Dashboard

        </li>

        <li class="active">

          <i class="fa-solid fa-upload"></i>

          Upload PDF

        </li>

        <li onclick="goAnalytics()">

          <i class="fa-solid fa-chart-column"></i>

          Analytics

        </li>

        <li onclick="logout()">

          <i class="fa-solid fa-right-from-bracket"></i>

          Logout

        </li>

      </ul>

    </aside>

    <!-- MAIN -->

    <main class="main">

      <!-- TOPBAR -->

      <div class="topbar">

        <div>

          <h1>Upload New PDF</h1>

          <p>
            Add new cybersecurity and
            programming resources
          </p>

        </div>

      </div>

      <!-- UPLOAD SECTION -->

      <section class="section">

        <div class="section-header">

          <h2>PDF Information</h2>

        </div>

        <form
          id="uploadForm"
          class="upload-form"
        >

          <div class="form-grid">

            <div class="form-group">

              <label>PDF Title</label>

              <input
                type="text"
                id="title"
                placeholder="Enter PDF title"
                required
              >

            </div>

            <div class="form-group">

              <label>Author</label>

              <input
                type="text"
                id="author"
                placeholder="Author name"
                required
              >

            </div>

            <div class="form-group">

              <label>Category</label>

              <select id="category">

                <option>
                  Ethical Hacking
                </option>

                <option>
                  Programming
                </option>

              </select>

            </div>

            <div class="form-group">

              <label>Subcategory</label>

              <input
                type="text"
                id="subcategory"
                placeholder="Example: Python"
                required
              >

            </div>

          </div>

          <div class="form-group">

            <label>Description</label>

            <textarea
              id="description"
              rows="6"
              placeholder="Write a brief description"
            ></textarea>

          </div>

          <div class="form-group">

            <label>Choose PDF</label>

            <input
              type="file"
              id="pdfFile"
              accept=".pdf"
              required
            >

          </div>

          <button
            type="submit"
            class="upload-btn"
          >

            <i class="fa-solid fa-upload"></i>

            Upload PDF

          </button>

        </form>

      </section>

    </main>

  </div>

  <script src="../js/dashboard.js"></script>

</body>

</html>
