<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAMTECH LIBRARY ADMIN LOGIN</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:
  linear-gradient(
    135deg,
    #050816,
    #0b1020,
    #111827
  );
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;
}

body::before{
  content:'';
  position:absolute;
  width:500px;
  height:500px;
  background:
  rgba(0,255,157,0.08);
  border-radius:50%;
  top:-200px;
  right:-200px;
  filter:blur(80px);
}

body::after{
  content:'';
  position:absolute;
  width:400px;
  height:400px;
  background:
  rgba(0,255,157,0.05);
  border-radius:50%;
  bottom:-150px;
  left:-150px;
  filter:blur(80px);
}

.login-container{
  width:100%;
  max-width:450px;
  position:relative;
  z-index:10;
}

.login-card{
  background:
  rgba(13,19,38,0.95);

  backdrop-filter:blur(20px);

  border:
  1px solid
  rgba(255,255,255,0.08);

  border-radius:30px;

  padding:40px;

  box-shadow:
  0 30px 60px rgba(0,0,0,0.4);
}

.logo{
  text-align:center;
  margin-bottom:30px;
}

.logo i{
  font-size:4rem;
  color:#00ff9d;
  margin-bottom:15px;
}

.logo h1{
  font-size:2rem;
}

.logo p{
  color:#888;
  margin-top:8px;
}

.form-group{
  margin-bottom:20px;
}

.form-group label{
  display:block;
  margin-bottom:8px;
  color:#bbb;
}

.input-box{
  position:relative;
}

.input-box i{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  color:#777;
}

.input-box input{
  width:100%;
  padding:16px 16px 16px 50px;
  border:none;
  border-radius:16px;
  background:#111827;
  color:white;
  outline:none;
  border:1px solid rgba(255,255,255,0.08);
}

.input-box input:focus{
  border-color:#00ff9d;
}

.login-btn{
  width:100%;
  padding:18px;
  border:none;
  border-radius:16px;
  background:#00ff9d;
  color:black;
  font-weight:bold;
  font-size:1rem;
  cursor:pointer;
  transition:0.3s ease;
}

.login-btn:hover{
  transform:translateY(-2px);
}

.message{
  margin-top:20px;
  padding:14px;
  border-radius:12px;
  display:none;
  text-align:center;
}

.message.error{
  background:rgba(255,0,0,0.15);
  color:#ff8b8b;
  border:1px solid rgba(255,0,0,0.2);
}

.message.success{
  background:rgba(0,255,157,0.15);
  color:#00ff9d;
  border:1px solid rgba(0,255,157,0.2);
}

.footer{
  margin-top:20px;
  text-align:center;
  color:#666;
  font-size:0.9rem;
}

</style>

</head>

<body>

<div class="login-container">

  <div class="login-card">

    <div class="logo">

      <i class="fa-solid fa-shield-halved"></i>

      <h1>SAMTECH LIBRARY</h1>

      <p>Administrator Login Portal</p>

    </div>

    <form id="loginForm">

      <div class="form-group">

        <label>Username</label>

        <div class="input-box">

          <i class="fa-solid fa-user"></i>

          <input
            type="text"
            id="username"
            required
            placeholder="Enter username"
          >

        </div>

      </div>

      <div class="form-group">

        <label>Password</label>

        <div class="input-box">

          <i class="fa-solid fa-lock"></i>

          <input
            type="password"
            id="password"
            required
            placeholder="Enter password"
          >

        </div>

      </div>

      <button
        type="submit"
        class="login-btn"
      >
        Login
      </button>

    </form>

    <div
      id="message"
      class="message"
    ></div>

    <div class="footer">

      SAMTECH SECURITY © 2026

    </div>

  </div>

</div>

<script src="../js/admin.js"></script>

</body>
</html>
