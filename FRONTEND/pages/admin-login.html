<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <section class="hero">

    <form id="loginForm">

      <h2>Admin Login</h2>

      <input
        type="text"
        id="username"
        placeholder="Username"
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
      >

      <button type="submit">
        Login
      </button>

    </form>

  </section>

  <script src="../js/admin.js"></script>
</body>
</html>
